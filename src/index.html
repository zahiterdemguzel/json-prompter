<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JSON Prompter</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & Variables ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f13;
    --bg-card: #16171d;
    --bg-input: #1c1d25;
    --bg-hover: #22232d;
    --border: #2a2b36;
    --border-focus: #5b6ef5;
    --text: #e4e5eb;
    --text-dim: #7a7d8e;
    --text-muted: #4e5064;
    --accent: #5b6ef5;
    --accent-glow: rgba(91, 110, 245, 0.15);
    --green: #34d399;
    --green-glow: rgba(52, 211, 153, 0.12);
    --red: #f87171;
    --red-glow: rgba(248, 113, 113, 0.1);
    --orange: #fb923c;
    --radius: 10px;
    --radius-sm: 6px;
    --font: "DM Sans", -apple-system, sans-serif;
    --mono: "JetBrains Mono", monospace;
    --shadow: 0 24px 80px rgba(0,0,0,0.55), 0 0 0 1px var(--border);
  }

  html, body {
    font-family: var(--font);
    background: transparent;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    user-select: none;
  }

  /* ── Window Shell ── */
  #app {
    width: 500px;
    height: 560px;
    background: var(--bg);
    border-radius: 14px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid var(--border);
    animation: popIn 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.92) translateY(8px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── Title Bar (draggable) ── */
  .titlebar {
    -webkit-app-region: drag;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 10px;
    flex-shrink: 0;
  }

  .titlebar h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .titlebar h1 .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .titlebar-actions {
    display: flex; gap: 6px;
    -webkit-app-region: no-drag;
  }

  .titlebar-actions button {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-card);
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .titlebar-actions button:hover {
    background: var(--bg-hover);
    color: var(--text);
    border-color: var(--border-focus);
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    padding: 0 18px;
    gap: 2px;
    flex-shrink: 0;
  }

  .tab {
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    border: none;
    background: none;
    cursor: pointer;
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    transition: all 0.15s;
    position: relative;
  }

  .tab:hover { color: var(--text-dim); }

  .tab.active {
    color: var(--text);
    background: var(--bg-card);
  }

  .tab.active::after {
    content: "";
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 20px; height: 2px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* ── Content Area ── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .panel.active { display: flex; }

  /* ── Builder Panel ── */
  .rows-container {
    flex: 1;
    overflow-y: auto;
    padding: 12px 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .rows-container::-webkit-scrollbar { width: 4px; }
  .rows-container::-webkit-scrollbar-track { background: transparent; }
  .rows-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .kv-row {
    display: flex;
    align-items: center;
    gap: 6px;
    animation: slideIn 0.15s ease-out;
  }

  @keyframes slideIn {
    0% { opacity: 0; transform: translateX(-6px); }
    100% { opacity: 1; transform: translateX(0); }
  }

  .kv-row input {
    flex: 1;
    height: 36px;
    padding: 0 11px;
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--text);
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .kv-row input::placeholder { color: var(--text-muted); }

  .kv-row input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .kv-row input.key-input { flex: 0.8; }
  .kv-row input.val-input { flex: 1.2; }

  .kv-sep {
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    flex-shrink: 0;
    width: 12px;
    text-align: center;
  }

  .type-badge {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 3px 6px;
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    border: 1px solid transparent;
    min-width: 36px;
    text-align: center;
  }

  .type-badge.str { background: var(--accent-glow); color: var(--accent); border-color: rgba(91,110,245,0.2); }
  .type-badge.num { background: var(--green-glow); color: var(--green); border-color: rgba(52,211,153,0.2); }
  .type-badge.bool { background: var(--red-glow); color: var(--orange); border-color: rgba(251,146,60,0.2); }
  .type-badge.null { background: rgba(122,125,142,0.1); color: var(--text-muted); border-color: rgba(122,125,142,0.15); }

  .remove-btn {
    width: 28px; height: 28px;
    border: none;
    background: none;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    opacity: 0;
  }

  .kv-row:hover .remove-btn { opacity: 1; }
  .remove-btn:hover { background: var(--red-glow); color: var(--red); }

  /* ── Add Row ── */
  .add-row {
    padding: 8px 18px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
  }

  .add-btn {
    width: 100%;
    height: 34px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
    background: none;
    color: var(--text-muted);
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .add-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
  }

  /* ── Preview Strip ── */
  .preview-strip {
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    background: var(--bg-card);
    flex-shrink: 0;
  }

  .preview-code {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.5;
    min-height: 18px;
  }

  /* ── Action Bar ── */
  .action-bar {
    display: flex;
    gap: 8px;
    padding: 12px 18px 16px;
    background: var(--bg);
    flex-shrink: 0;
  }

  .action-btn {
    flex: 1;
    height: 38px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-card);
    color: var(--text);
    font-family: var(--font);
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .action-btn:hover {
    background: var(--bg-hover);
    border-color: var(--border-focus);
  }

  .action-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .action-btn.primary:hover {
    background: #4e60e0;
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .action-btn .icon { font-size: 14px; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--green);
    color: #0e0f13;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── History Panel ── */
  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .history-item {
    padding: 10px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
  }

  .history-item:hover {
    border-color: var(--border-focus);
    background: var(--bg-hover);
  }

  .history-json {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-time {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .history-empty {
    color: var(--text-muted);
    font-size: 12px;
    text-align: center;
    padding: 40px 0;
  }

  .history-actions {
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div id="app">
  <!-- Title Bar -->
  <div class="titlebar">
    <h1><span class="dot"></span>JSON Prompter</h1>
    <div class="titlebar-actions">
      <button onclick="window.api.hideWindow()" title="Close (Esc)">✕</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="builder">Builder</button>
    <button class="tab" data-tab="history">History</button>
  </div>

  <!-- Builder Panel -->
  <div class="panel active" data-panel="builder">
    <div class="rows-container" id="rows"></div>
    <div class="add-row">
      <button class="add-btn" id="addBtn">＋ Add field <span style="color:var(--text-muted); font-size:10px; margin-left:4px;">Tab ↹</span></button>
    </div>
    <div class="preview-strip">
      <div class="preview-code" id="preview">{ }</div>
    </div>
    <div class="action-bar">
      <button class="action-btn" onclick="handleCopy()">
        <span class="icon">⎘</span> Copy
      </button>
      <button class="action-btn primary" onclick="handlePaste()">
        <span class="icon">⎋</span> Paste &amp; Close
      </button>
    </div>
  </div>

  <!-- History Panel -->
  <div class="panel" data-panel="history">
    <div class="history-list" id="historyList"></div>
    <div class="history-actions">
      <button class="action-btn" onclick="clearHistory()" style="width:100%">Clear History</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
  // ── State ──
  const TYPES = ["str", "num", "bool", "null"];
  let rows = [{ key: "", value: "", type: "str" }];

  // ── Tab Switching ──
  document.querySelectorAll(".tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
      tab.classList.add("active");
      document.querySelector(`[data-panel="${tab.dataset.tab}"]`).classList.add("active");
      if (tab.dataset.tab === "history") loadHistory();
    });
  });

  // ── Render Rows ──
  function render() {
    const container = document.getElementById("rows");
    container.innerHTML = "";

    rows.forEach((row, i) => {
      const div = document.createElement("div");
      div.className = "kv-row";

      const keyInput = document.createElement("input");
      keyInput.className = "key-input";
      keyInput.placeholder = "key";
      keyInput.value = row.key;
      keyInput.addEventListener("input", (e) => {
        rows[i].key = e.target.value;
        updatePreview();
      });
      keyInput.addEventListener("keydown", (e) => handleKeyNav(e, i, "key"));

      const sep = document.createElement("span");
      sep.className = "kv-sep";
      sep.textContent = "→";

      const valInput = document.createElement("input");
      valInput.className = "val-input";
      valInput.placeholder = row.type === "bool" ? "true / false" : row.type === "null" ? "(null)" : "value";
      valInput.value = row.value;
      valInput.disabled = row.type === "null";
      valInput.addEventListener("input", (e) => {
        rows[i].value = e.target.value;
        updatePreview();
      });
      valInput.addEventListener("keydown", (e) => handleKeyNav(e, i, "val"));

      const badge = document.createElement("span");
      badge.className = `type-badge ${row.type}`;
      badge.textContent = row.type;
      badge.title = "Click to cycle type";
      badge.addEventListener("click", () => {
        const idx = TYPES.indexOf(rows[i].type);
        rows[i].type = TYPES[(idx + 1) % TYPES.length];
        if (rows[i].type === "null") rows[i].value = "";
        if (rows[i].type === "bool" && !["true", "false"].includes(rows[i].value)) rows[i].value = "true";
        render();
        updatePreview();
      });

      const removeBtn = document.createElement("button");
      removeBtn.className = "remove-btn";
      removeBtn.textContent = "×";
      removeBtn.addEventListener("click", () => {
        if (rows.length > 1) {
          rows.splice(i, 1);
          render();
          updatePreview();
        }
      });

      div.append(keyInput, sep, valInput, badge, removeBtn);
      container.appendChild(div);
    });

    updatePreview();
  }

  // ── Keyboard Navigation ──
  function handleKeyNav(e, rowIndex, field) {
    if (e.key === "Tab" && !e.shiftKey && field === "val" && rowIndex === rows.length - 1) {
      e.preventDefault();
      addRow();
    }
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      handlePaste();
    }
    if (e.key === "Escape") {
      window.api.hideWindow();
    }
    // Arrow down → next row same field
    if (e.key === "ArrowDown" && rowIndex < rows.length - 1) {
      e.preventDefault();
      const sel = field === "key" ? ".key-input" : ".val-input";
      document.querySelectorAll(sel)[rowIndex + 1]?.focus();
    }
    if (e.key === "ArrowUp" && rowIndex > 0) {
      e.preventDefault();
      const sel = field === "key" ? ".key-input" : ".val-input";
      document.querySelectorAll(sel)[rowIndex - 1]?.focus();
    }
    // Backspace on empty row removes it
    if (e.key === "Backspace" && rows[rowIndex].key === "" && rows[rowIndex].value === "" && rows.length > 1) {
      if (field === "key") {
        e.preventDefault();
        rows.splice(rowIndex, 1);
        render();
        const prevIdx = Math.max(0, rowIndex - 1);
        setTimeout(() => document.querySelectorAll(".val-input")[prevIdx]?.focus(), 20);
      }
    }
  }

  function addRow() {
    rows.push({ key: "", value: "", type: "str" });
    render();
    setTimeout(() => {
      const keys = document.querySelectorAll(".key-input");
      keys[keys.length - 1]?.focus();
    }, 20);
  }

  document.getElementById("addBtn").addEventListener("click", addRow);

  // ── Build JSON ──
  function buildJson() {
    const obj = {};
    rows.forEach((r) => {
      if (!r.key.trim()) return;
      const k = r.key.trim();
      switch (r.type) {
        case "str":
          obj[k] = r.value;
          break;
        case "num":
          obj[k] = Number(r.value) || 0;
          break;
        case "bool":
          obj[k] = r.value.toLowerCase() === "true";
          break;
        case "null":
          obj[k] = null;
          break;
      }
    });
    return JSON.stringify(obj, null, 2);
  }

  function updatePreview() {
    const json = buildJson();
    document.getElementById("preview").textContent =
      json.length > 120 ? json.slice(0, 120) + "…" : json;
  }

  // ── Actions ──
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1500);
  }

  async function handleCopy() {
    const json = buildJson();
    await window.api.copyJson(json);
    showToast("Copied to clipboard ✓");
  }

  async function handlePaste() {
    const json = buildJson();
    await window.api.pasteJson(json);
  }

  // ── History ──
  async function loadHistory() {
    const list = document.getElementById("historyList");
    const history = await window.api.getHistory();
    if (!history.length) {
      list.innerHTML = '<div class="history-empty">No history yet</div>';
      return;
    }
    list.innerHTML = history
      .map(
        (h, i) => `
      <div class="history-item" onclick="loadFromHistory(${i})">
        <div class="history-json">${escHtml(h.json)}</div>
        <div class="history-time">${timeAgo(h.timestamp)}</div>
      </div>`
      )
      .join("");
  }

  function loadFromHistory(idx) {
    window.api.getHistory().then((history) => {
      if (!history[idx]) return;
      try {
        const obj = JSON.parse(history[idx].json);
        rows = Object.entries(obj).map(([key, value]) => ({
          key,
          value: value === null ? "" : String(value),
          type:
            value === null ? "null" : typeof value === "boolean" ? "bool" : typeof value === "number" ? "num" : "str",
        }));
        if (!rows.length) rows = [{ key: "", value: "", type: "str" }];
        // Switch to builder tab
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
        document.querySelector('[data-tab="builder"]').classList.add("active");
        document.querySelector('[data-panel="builder"]').classList.add("active");
        render();
      } catch (e) {}
    });
  }

  async function clearHistory() {
    await window.api.clearHistory();
    loadHistory();
    showToast("History cleared");
  }

  function escHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function timeAgo(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return "just now";
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  // ── Focus on show ──
  window.api.onWindowShown(() => {
    setTimeout(() => {
      const firstKey = document.querySelector(".key-input");
      if (firstKey) firstKey.focus();
    }, 50);
  });

  // ── Global ESC ──
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") window.api.hideWindow();
  });

  // ── Init ──
  render();
</script>
</body>
</html>
