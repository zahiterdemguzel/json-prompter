<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON Prompter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared/styles/theme.css" />
  <style>
    /* Extension popup: fixed size, rounded corners */
    html, body {
      background: transparent;
      width: 460px;
      height: 488px;
    }

    #app {
      width: 460px;
      height: 488px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* Settings panel */
    .settings-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .settings-row-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .settings-row-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .settings-row-desc {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 11px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: var(--accent);
      border-color: var(--accent);
    }

    .toggle-track::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-track::after {
      transform: translateX(16px);
      background: #fff;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="tabs">
    <button class="tab active" data-tab="builder">Builder</button>
    <button class="tab" data-tab="history">History</button>
    <button class="tab" data-tab="templates">Templates</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <div class="content">
    <div class="panel active" data-panel="builder">
      <div class="rows-container" id="rows"></div>
      <div class="add-row">
        <button class="add-btn" id="addBtn">
          ＋ Add field <span style="color:var(--text-muted); font-size:10px; margin-left:4px;">Tab ↹</span>
        </button>
      </div>
      <div class="action-bar">
        <button class="action-btn" id="copyBtn">
          <span class="icon">⎘</span> Copy
        </button>
        <button class="action-btn" id="saveTemplateBtn">
          <span class="icon">☆</span> Save Template
        </button>
        <button class="action-btn primary" id="pasteBtn">
          <span class="icon">⎋</span> Paste &amp; Close
        </button>
      </div>
    </div>

    <div class="panel" data-panel="templates">
      <div class="history-list" id="templateList"></div>
    </div>

    <div class="panel" data-panel="history">
      <div class="history-search-wrap">
        <input id="historySearch" type="search" placeholder="Search history…" autocomplete="off" />
      </div>
      <div class="history-list" id="historyList"></div>
      <div class="history-actions">
        <button class="action-btn" id="clearHistoryBtn" style="width:100%">Clear History</button>
      </div>
    </div>

    <div class="panel" data-panel="settings">
      <div class="settings-panel">
        <div class="settings-row">
          <div class="settings-row-info">
            <div class="settings-row-label">Theme</div>
            <div class="settings-row-desc">Choose light, dark, or follow system preference</div>
          </div>
          <select id="themeSelect" style="background:var(--bg-input);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 8px;font-size:12px;cursor:pointer;">
            <option value="auto">Auto</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </div>
        <div class="settings-row">
          <div class="settings-row-info">
            <div class="settings-row-label">Pretty JSON output</div>
            <div class="settings-row-desc">Format JSON with indentation (uncheck for minified)</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="prettyToggle" checked />
            <span class="toggle-track"></span>
          </label>
        </div>
        <div class="settings-row">
          <div class="settings-row-info">
            <div class="settings-row-label">Double Ctrl shortcut</div>
            <div class="settings-row-desc">Press Ctrl twice quickly to open JSON Prompter</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="doubleCtrlToggle" />
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<!-- api.js sets window.api and must run before the ES modules below -->
<script src="api.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const themeSelect = document.getElementById("themeSelect");
  window.api.getSetting("theme").then(v => { themeSelect.value = v || "auto"; });
  themeSelect.addEventListener("change", () => {
    window.api.setSetting("theme", themeSelect.value);
    document.documentElement.className = "theme-" + themeSelect.value;
  });

  const prettyToggle = document.getElementById("prettyToggle");
  window.api.getSetting("prettyJson").then(v => { prettyToggle.checked = v !== false; });
  prettyToggle.addEventListener("change", () => window.api.setSetting("prettyJson", prettyToggle.checked));

  const doubleCtrlToggle = document.getElementById("doubleCtrlToggle");
  chrome.storage.local.get("json-prompter-double-ctrl", r => {
    doubleCtrlToggle.checked = r["json-prompter-double-ctrl"] !== false;
  });
  doubleCtrlToggle.addEventListener("change", () => {
    chrome.storage.local.set({ "json-prompter-double-ctrl": doubleCtrlToggle.checked });
  });
});
</script>
<script type="module" src="shared/js/app.js"></script>
</body>
</html>
