<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON Prompter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared/styles/theme.css" />
  <style>
    /* Extension popup: opaque background, fixed size, no drag regions */
    html, body {
      background: var(--bg);
      width: 460px;
      height: 540px;
    }

    #app {
      width: 460px;
      height: 540px;
      border-radius: 0;
      border: none;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="titlebar">
    <h1><span class="dot"></span>JSON Prompter</h1>
    <div class="titlebar-actions">
      <button id="closeBtn" title="Close (Esc)">✕</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="builder">Builder</button>
    <button class="tab" data-tab="history">History</button>
  </div>

  <div class="content">
    <div class="panel active" data-panel="builder">
      <div class="rows-container" id="rows"></div>
      <div class="add-row">
        <button class="add-btn" id="addBtn">
          ＋ Add field <span style="color:var(--text-muted); font-size:10px; margin-left:4px;">Tab ↹</span>
        </button>
      </div>
      <div class="preview-strip">
        <div class="preview-code" id="preview">{ }</div>
      </div>
      <div class="action-bar">
        <button class="action-btn" id="copyBtn">
          <span class="icon">⎘</span> Copy
        </button>
        <button class="action-btn primary" id="pasteBtn">
          <span class="icon">⎋</span> Paste &amp; Close
        </button>
      </div>
    </div>

    <div class="panel" data-panel="history">
      <div class="history-list" id="historyList"></div>
      <div class="history-actions">
        <button class="action-btn" id="clearHistoryBtn" style="width:100%">Clear History</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<!-- api.js sets window.api and must run before the ES modules below -->
<script src="api.js"></script>

<script>
  // Close button: runs immediately (before module scripts which are deferred)
  document.getElementById("closeBtn").addEventListener("click", () => window.api.hideWindow());
</script>

<script type="module" src="shared/js/app.js"></script>
</body>
</html>
