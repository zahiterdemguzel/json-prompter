<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>JSON Prompter — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #13131a;
      color: #e5e5f0;
      padding: 28px 24px;
      min-width: 280px;
    }

    h1 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #55556a;
      margin-bottom: 24px;
    }

    .section-label {
      font-size: 13px;
      font-weight: 500;
      color: #c5c5e0;
      margin-bottom: 14px;
    }

    /* 3×3 grid */
    .placement-grid {
      display: grid;
      grid-template-columns: repeat(3, 40px);
      grid-template-rows: repeat(3, 40px);
      gap: 5px;
      width: fit-content;
    }

    .cell {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid transparent;
      transition: background 0.12s, border-color 0.12s;
    }
    .cell:hover {
      background: rgba(99,102,241,0.18);
      border-color: rgba(99,102,241,0.35);
    }
    .cell.active {
      background: rgba(99,102,241,0.30);
      border-color: #6366f1;
    }
    .cell.center {
      cursor: default;
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.12);
      border-radius: 5px;
    }
    .cell.center:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.12);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #55556a;
      transition: background 0.12s;
    }
    .cell.active .dot {
      background: #a5b4fc;
    }

    .sel-label {
      margin-top: 14px;
      font-size: 12px;
      color: #55556a;
    }
    .sel-label span {
      color: #a5b4fc;
      font-weight: 500;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 24px 0;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .toggle-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
      color: #c5c5e0;
    }

    .toggle-desc {
      font-size: 11px;
      color: #55556a;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 11px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: #6366f1;
      border-color: #6366f1;
    }

    .toggle-track::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: #55556a;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-track::after {
      transform: translateX(16px);
      background: #fff;
    }
  </style>
</head>
<body>
  <h1>JSON Prompter Settings</h1>
  <div class="section-label">Shortcut Button Placement</div>
  <div class="placement-grid" id="grid"></div>
  <div class="sel-label">Placement: <span id="sel-text">Top-left corner</span></div>

  <div class="divider"></div>

  <div class="section-label">Keyboard Shortcut</div>
  <div class="toggle-row">
    <div class="toggle-info">
      <div class="toggle-label">Double Ctrl shortcut</div>
      <div class="toggle-desc">Press Ctrl twice quickly to open JSON Prompter</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="doubleCtrlToggle" />
      <span class="toggle-track"></span>
    </label>
  </div>

  <script src="options.js"></script>
</body>
</html>
